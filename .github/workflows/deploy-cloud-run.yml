name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-cloud-run.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/1045507392600/locations/global/workloadIdentityPools/github-pool/providers/github"
          service_account: "github-deployer@spuntech-api.iam.gserviceaccount.com"

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: spuntech-api
          region: us-east1
          source: ./backend
